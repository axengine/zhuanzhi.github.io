<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title | default: site.title }} - 专业方志编撰服务</title>
    <meta name="description" content="{{ site.description }}">
    <meta name="keywords" content="四川撰志文化, 宜宾方志编撰, 地方志编写, 行业志, 年鉴编纂, 史料研究, 文化发展">
    <style>
        /* 保持之前的精美样式 */
        :root {
            --primary-color: #a01a1a; /* 朱砂红 */
            --text-color: #2c3e50; /* 深灰 */
            --bg-color: #fcfcfc; /* 宣纸白 */
            --secondary-color: #7f8c8d; /* 细灰 */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: "Noto Serif SC", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", serif;
            color: var(--text-color);
            line-height: 1.8;
            background-color: var(--bg-color);
            -webkit-font-smoothing: antialiased;
        }

        .container { max-width: 1100px; margin: 0 auto; padding: 0 20px; }

        header { padding: 40px 0; text-align: center; border-bottom: 1px solid #eee; background: white; }
        header h1 { font-size: 2.2rem; color: var(--primary-color); letter-spacing: 4px; font-weight: 700; }
        header p { font-size: 0.9rem; color: var(--secondary-color); margin-top: 10px; letter-spacing: 2px; }

        section { padding: 80px 0; }
        .section-title { font-size: 2rem; margin-bottom: 60px; text-align: center; position: relative; color: var(--primary-color); }
        .section-title::after { content: ""; display: block; width: 60px; height: 3px; background: var(--primary-color); margin: 20px auto 0; }

        .intro-text { font-size: 1.15rem; text-indent: 2em; text-align: justify; color: #444; max-width: 900px; margin: 0 auto; }

        .gallery { 
            display: grid; 
            gap: 30px; 
            margin-top: 40px; 
            grid-template-columns: 1fr; /* 手机端默认 1 列 */
        }

        /* 平板端：2 列 */
        @media (min-width: 768px) {
            .gallery { grid-template-columns: repeat(2, 1fr); }
        }

        /* 桌面端：3 列 */
        @media (min-width: 1024px) {
            .gallery { grid-template-columns: repeat(3, 1fr); }
            .grid-4 { grid-template-columns: repeat(4, 1fr) !important; }
        }

        .gallery-item { background: #fff; border: 1px solid #eee; transition: all 0.3s ease; overflow: hidden; display: flex; flex-direction: column; }
        .gallery-item:hover { transform: translateY(-8px); box-shadow: 0 15px 30px rgba(0,0,0,0.08); }
        .gallery-item img { width: 100%; height: 240px; object-fit: cover; display: block; border-bottom: 1px solid #f5f5f5; }
        .gallery-item .content { padding: 20px; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }

        .contact { background-color: #f4f4f4; text-align: center; }
        .contact-info { list-style: none; padding: 20px 0; font-size: 1.1rem; }
        .contact-info li { margin: 15px 0; }

        footer { padding: 50px 0; text-align: center; font-size: 0.9rem; color: #999; border-top: 1px solid #eee; background: white; }

        @media (max-width: 600px) {
            header h1 { font-size: 1.6rem; }
            section { padding: 50px 0; }
            .section-title { font-size: 1.6rem; }
            .gallery { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header>
        <div class="container">
            <h1>{{ site.title }}</h1>
            <p>专注志书编纂，传承历史文脉</p>
        </div>
    </header>

    {{ content }}

    <footer>
        <div class="container">
            &copy; {{ site.time | date: '%Y' }} {{ site.title }} 版权所有
        </div>
    </footer>

</body>
</html>
