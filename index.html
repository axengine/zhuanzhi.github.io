---
layout: default
title: 首页 - 四川撰志文化发展有限公司
---

<section id="about">
    <div class="container">
        <h2 class="section-title">关于我们</h2>
        <div class="intro-text">
            {{ site.description | newline_to_br }}
        </div>
    </div>
</section>

<section id="products" style="background-color: #fff;">
    <div class="container">
        <h2 class="section-title">展品展示</h2>
        <div class="gallery">
            {% for product in site.data.products %}
            <div class="gallery-item">
                <img src="{{ product.image | relative_url }}" alt="{{ product.name }}">
                <p>{{ product.name }}</p>
            </div>
            {% endfor %}
        </div>
    </div>
</section>

<section id="contact" class="contact">
    <div class="container">
        <h2 class="section-title">联系我们</h2>
        <ul class="contact-info">
            <li><strong>办公地址：</strong> {{ site.contact.address }}</li>
            <li><strong>咨询电话：</strong> {{ site.contact.phone }}</li>
            <li><strong>业务咨询：</strong> {{ site.contact.services }}</li>
        </ul>
    </div>
</section>
